name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -e ".[dev]"
        timeout-minutes: 10
      - run: pytest tests/test_pipeline_invariants.py tests/test_e2e_synthetic.py -v
